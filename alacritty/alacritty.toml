# ---
# title:  alacritty configuration file
# author: emil lenz
# email:  emillenz@protonmail.com
# date:   2022-02-25
# info:   minimal, coinsistent and fast config
# ---
import = ["~/.config/alacritty/modus_operandi.toml"]
ipc_socket = true
live_config_reload = true
working_directory = "None"

[cursor]
unfocused_hollow = false
vi_mode_style = "Block"

[env]
WINIT_X11_SCALE_FACTOR = "1" # NOTE :: same fontsize across different dpi displays

[font]
normal = {family = "Iosevka Comfy"}
size = 10.5 # HACK :: .5 scales it properly

[mouse]
hide_when_typing = true

[scrolling]
multiplier = 10

[selection]
save_to_clipboard = true

[shell]
program = "/usr/bin/fish"
args = ["--login"]

[window]
decorations = "full"
dynamic_padding = true
dynamic_title = true
startup_mode = "Maximized"
opacity = 1.0

# HACK :: make c-<n> send right key sequence (for tmux, emacs, etc..)
[keyboard]
bindings= [
  {key="Key1", mods= "Control", chars= "\u001b[49;5u" },
  {key="Key2", mods= "Control", chars= "\u001b[50;5u" },
  {key="Key3", mods= "Control", chars= "\u001b[51;5u" },
  {key="Key4", mods= "Control", chars= "\u001b[52;5u" },
  {key="Key5", mods= "Control", chars= "\u001b[53;5u" },
  {key="Key6", mods= "Control", chars= "\u001b[54;5u" },
  {key="Key7", mods= "Control", chars= "\u001b[55;5u" },
  {key="Key8", mods= "Control", chars= "\u001b[56;5u" },
  {key="Key9", mods= "Control", chars= "\u001b[57;5u" },
  {key="Key0", mods= "Control", chars= "\u001b[48;5u" }
]
