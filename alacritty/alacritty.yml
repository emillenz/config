window:
  dimensions:
    columns: 0
    lines: 0
  padding:
    x: 1
    y: 1
  dynamic_padding: true
  decorations: full
  opacity: 1.0
  startup_mode: Maximized
  dynamic_title: true
  title: Alacritty
  class:
    general: Alacritty
    instance: Alacritty

env:
  TERM: xterm-256color

scrolling:
  history: 10000
  multiplier: 5

font:
  normal:
    family: Iosevka Nerd Font
    style: Regular
  bold:
    family: Iosevka Nerd Font
    style: Bold
  italic:
    family: Iosevka Nerd Font
    style: Italic
  bold_italic:
    family: Iosevka Nerd Font
    style: Bold Italic
  size: 10
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0
  #builtin_box_drawing: true

# draw_bold_text_with_bright_colors: false

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: true

cursor:
  style:
    shape: Block
    blinking: Never
  vi_mode_style: Block # HACK: set to BLOCK not beam -> tmux normal-mode will be block not beam
  unfocused_hollow: false
  thickness: 0.15

live_config_reload: true

shell:
  program: /usr/bin/nu
  args:
    - --login

working_directory: None

ipc_socket: true

mouse:
  double_click: { threshold: 300 }
  triple_click: { threshold: 300 }
  hide_when_typing: true

hints:
  alphabet: "jfkdls;ahgurieowpq"
  enabled:
    - regex: "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"
      hyperlinks: true
      command: xdg-open
      post_processing: true
      mouse:
        enabled: true
        mods: None
      binding:
        key: O
        mods: Shift|Alt

# solarized dark
colors:
  primary:
    background: "#002b36" # base03
    foreground: "#839496" # base0
  cursor:
    text: "#002b36" # base03
    cursor: "#839496" # base0
  normal:
    black: "#073642" # base02
    red: "#dc322f" # red
    green: "#859900" # green
    yellow: "#b58900" # yellow
    blue: "#268bd2" # blue
    magenta: "#c678dd" # magenta
    cyan: "#2aa198" # cyan
    white: "#839496" # base2
    gray: "#657b83" # base3
  bright:
    black: "#03282F" # base03
    red: "#ff6655" # orange
    green: "#99bb66" # base01
    yellow: "#ecbe7b" # base00
    blue: "#51afef" # base0
    magenta: "#a9a1e1" # violet
    cyan: "#46d9ff" # base1
    white: "#657b83" # base3
    gray: "#657b83" # base3
  vi_mode_cursor:
    text: "#002b36" # base03
    cursor: "#839496" # base0
  search:
    matches:
      foreground: "#002b36"
      background: "#839496"
    focused_match:
      foreground: "#002b36"
      background: "#839496"
  hints:
    start:
      foreground: "#002b36"
      background: "#b58900"
    end:
      foreground: "#b58900"
      background: "#002b36"
  line_indicator:
    foreground: none
    background: none
  footer_bar:
    background: "#839496"
    foreground: "#002b36"
  selection:
    text: CellBackground
    background: CellForeground
  transparent_background_colors: false
