# HACK :: fix tmux colors (various terminals)
set  -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB,xterm-256color:RGB,gnome*:RGB"

set-option -g detach-on-destroy on
set-option -g focus-events on
set-option -g mouse on
set-option -s escape-time 0
set-option -g history-limit 1000000
set-option -g set-clipboard on
set-option -g buffer-limit 20
set-option -g display-time 0
set-option -g focus-events on
set-option -g remain-on-exit off
set-option -g base-index 1
set-option -g renumber-windows on
set-option -g pane-base-index 1
set-option -g automatic-rename on
set-option -g allow-rename on
set-option -g aggressive-resize on
set-option -g mode-keys vi

set-option -g prefix None # we don't need prefix, instead we map this most efficient mapping scheme on the top level
# - autocreate new tmux window if not exists (no mental overhead)
bind-key -n C-1   run-shell 'tmux select-window -t 1 || tmux new-window -t 1'
bind-key -n C-2   run-shell 'tmux select-window -t 2 || tmux new-window -t 2'
bind-key -n C-3   run-shell 'tmux select-window -t 3 || tmux new-window -t 3'
bind-key -n C-4   run-shell 'tmux select-window -t 4 || tmux new-window -t 4'
bind-key -n C-b   if-shell "$is_editor" "send-keys C-b" "run-shell 'tmux last-window || tmux new-window -t 2'"

# - When in editor, don't go into copy-mode
is_editor='[[ "#{pane_current_command}" =~ ^emacs.* ]]'
bind-key -n C-v if-shell "$is_editor" "send-keys C-v" "copy-mode"
# better vim scrollback controls
unbind-key -T copy-mode-vi v # HACK :: so proper visual-mode works
bind-key   -T copy-mode-vi v   send-keys -X begin-selection
bind-key   -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key   -T copy-mode-vi y   send-keys -X copy-pipe "xclip -in -selection clipboard"
bind-key   -T copy-mode-vi m   send-keys -X set-option-mark
bind-key   -T copy-mode-vi \'  send-keys -X jump-to-mark
bind-key   -T copy-mode-vi u   send-keys -X halfpage-up
bind-key   -T copy-mode-vi d   send-keys -X halfpage-down
bind-key   -T copy-mode-vi q   send-keys -X cancel

# statusbar :: none
set-option -g status off
set-option -g status-position bottom # prompt

# modus-vivendi colors ::
bg="#ffffff"
fg="#000000"
region_bg="#bdbdbd"
set-option -g mode-style "fg=$fg,bg=$region_bg"
set-option -g message-style "fg=$fg,bg=$region_bg"
