modmap:
  - name: global
    remap:
      capslock: esc
      alt_r: ctrl_r

keymap:
  - name: browser
    application:
      only: firefox
    remap:
      # GLOBAL NAVIGATION SCHEME (note using plugin that enables tabswitching using CTRL)
      C-b: C-Tab
      C-q: c-w
      C-r: [c-t, shift-key_6, space] # history search
      C-Enter: [c-t, shift-key_8, space] # goto bookmark
      # EDITING
      c-h: backspace
      c-w: c-backspace
      # COMPLETION
      C-n: down
      C-p: up
