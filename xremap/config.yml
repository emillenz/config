modmap:
  - name: global
    remap:
      capslock: esc
      alt_r: ctrl_r

keymap:
  - name: editing
    application:
      not: [Emacs, Alacritty]
    remap:
      # NAVIGATION
      C-q: c-w
      C-e: c-l
      # EDITING
      c-h: backspace
      c-w: c-backspace
      C-u: [shift-home, delete]
      # COMPLETION
      C-n: down
      C-p: up
