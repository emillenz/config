modmap:
  - name: global
    remap:
      capslock: ctrl_r

keymap:
  - name: browser
    application:
      only: firefox
    remap:
      # GLOBAL NAVIGATION SCHEME (+ vimium browser extension)
      C-a: C-Tab
      C-q: c-w
      # EDITING
      c-h: backspace
      c-w: c-backspace
      c-u: [shift-home, delete]
      # COMPLETION
      c-n: down
      c-p: up
