# [[file:config.org::*Src][Src:1]]
virtual_modifiers:
  - menu
  - capslock

modmap:
  - name: global
    remap:
      capslock:
        alone: backspace
        held: menu
        one_timeout_millis: 200
      alt_r: capslock
      alt_l:
        alone: esc
        held: alt_l
        one_timeout_millis: 200

keymap:
  - name: browser
    application:
      only: firefox
    remap:
      M-t: [c-t, esc] # HACK :: needs esc
      M-i: c-l # i -> insert
      M-o: c-o
      M-q: c-w
      M-slash: c-f
      M-question: shift-f3
      M-n: c-g
      M-shift-n: c-shift-g

  - name: global
    remap:
      capslock-j: down
      capslock-k: up
      capslock-h: left
      capslock-l: right
      capslock-a: end
      capslock-i: home
      capslock-x: delete
      capslock-e: c-right
      capslock-b: c-left
      capslock-w: [c-right, c-right, c-left]
      capslock-o: enter
      capslock-c: c-backspace
      capslock-slash: c-f
      capslock-question: shift-f3
      capslock-y: [C-a, C-c]
      capslock-p: C-v
      capslock-d:
        remap:
          capslock-d: [home, shift-end, C-x]
          capslock-a: [shift-end, C-x]
          capslock-i: [shift-home, C-x]

      menu-q: apostrophe
      menu-w: shift-comma
      menu-e: shift-dot
      menu-r: shift-apostrophe
      menu-t: grave

      menu-a: shift-key_1
      menu-s: shift-equal
      menu-d: equal
      menu-f: minus
      menu-g: shift-key_3

      menu-x: shift-key_6
      menu-c: shift-key_8
      menu-v: slash
      menu-b: shift-grave

      menu-y: shift-key_7
      menu-h: shift-backslash
      menu-n: backslash

      menu-u: shift-semicolon
      menu-j: shift-minus
      menu-m: shift-key_4

      menu-i: leftbrace
      menu-o: rightbrace
      menu-k: shift-key_9
      menu-l: shift-key_0
      menu-comma: shift-leftbrace
      menu-dot: shift-rightbrace

      menu-p: shift-key_2
      menu-semicolon: shift-key_5
      menu-slash: shift-slash
# Src:1 ends here
