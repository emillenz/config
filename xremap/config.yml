# [[file:config.org::*src][src:1]]
# note :: unused keys
virtual_modifiers:
  - menu

modmap:
  - name: global
    remap:
      capslock:
        alone: backspace
        held: menu
        alone_timeout_millis: 200
      backspace: capslock
      alt_l: super_l
      alt_r:
        alone: esc
        held: alt_r
        alone_timeout_millis: 200

keymap:
  - name: browser
    application:
      only: firefox
    remap:
      M-t: c-t
      M-q: c-w

  - name: symlayer
    remap:
      menu-q: apostrophe
      menu-w: shift-comma
      menu-e: shift-dot
      menu-r: shift-apostrophe
      menu-t: grave

      menu-a: shift-key_1
      menu-s: shift-equal
      menu-d: equal
      menu-f: minus
      menu-g: shift-key_3

      menu-x: shift-key_6
      menu-c: shift-key_8
      menu-v: slash
      menu-b: backslash

      menu-y: shift-key_7
      menu-h: shift-backslash
      menu-n: shift-grave

      menu-u: shift-semicolon
      menu-j: shift-minus
      menu-m: shift-key_4

      menu-i: leftbrace
      menu-o: rightbrace
      menu-k: shift-key_9
      menu-l: shift-key_0
      menu-comma: shift-leftbrace
      menu-dot: shift-rightbrace

      menu-p: shift-key_2
      menu-semicolon: shift-slash
      menu-slash: shift-key_5
# src:1 ends here
