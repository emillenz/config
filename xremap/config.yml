# [[file:config.org::*Src][Src:1]]
# note :: unused keys
virtual_modifiers:
  - menu
  - capslock

modmap:
  - name: global
    remap:
      capslock:
        alone: backspace
        held: menu
        alone_timeout_millis: 200
      alt_l: super_l
      alt_r:
        alone: esc
        held: alt_r
        alone_timeout_millis: 200

keymap:
  - name: browser
    application:
      only: firefox
    remap:
      M-t: [c-t, esc] # HACK :: needs esc (hides popup menu)
      M-i: c-l
      M-o: c-o
      M-q: c-w
      M-slash: c-f
      M-question: shift-f3
      M-n: c-g
      M-shift-n: c-shift-g

  - name: completion
    remap:
      c-j: down
      c-k: up

  - name: symlayer
    remap:
      menu-q: apostrophe
      menu-w: shift-comma
      menu-e: shift-dot
      menu-r: shift-apostrophe
      menu-t: grave

      menu-a: shift-key_1
      menu-s: shift-equal
      menu-d: equal
      menu-f: minus
      menu-g: shift-key_3

      menu-x: shift-key_6
      menu-c: shift-key_8
      menu-v: slash
      menu-b: shift-grave

      menu-y: shift-key_7
      menu-h: shift-backslash
      menu-n: backslash

      menu-u: shift-semicolon
      menu-j: shift-minus
      menu-m: shift-key_4

      menu-i: leftbrace
      menu-o: rightbrace
      menu-k: shift-key_9
      menu-l: shift-key_0
      menu-comma: shift-leftbrace
      menu-dot: shift-rightbrace

      menu-p: shift-key_2
      menu-semicolon: shift-key_5
      menu-slash: shift-slash
# Src:1 ends here
