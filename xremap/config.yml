modmap:
  - name: global
    remap:
      capslock:
        held: ctrl_r
        alone: esc
        one_timeout_milis: 100

keymap:
  - name: browser
    application:
      only: firefox
    remap:
      # GLOBAL NAVIGATION SCHEME (using vim browser extension)
      C-b: C-Tab
      C-q: c-w
      # EDITING
      c-h: backspace
      c-w: c-backspace
      c-u: [shift-home, delete]
      # COMPLETION
      c-n: down
      c-p: up
