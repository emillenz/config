modmap:
  - name: global
    remap:
      capslock: esc
      alt_r: ctrl_r

keymap:
  - name: browser
    application:
      only: firefox
    remap:
      # GLOBAL NAVIGATION SCHEME
      C-q: c-w
      C-e: c-l # locate
      C-r: [c-t, shift-key_6, space] # history search
      C-g: [c-t, shift-key_8, space] # goto bookmark
      # EDITING
      c-h: backspace
      c-w: c-backspace
      C-u: [shift-home, delete]
      # COMPLETION
      C-n: down
      C-p: up
