# [[file:config.org::*Src][Src:1]]
virtual_modifiers:
  - capslock

modmap:
  - name: global
    remap:
      backspace:
        alone: backspace
        held: capslock
        one_timeout_millis: 10
      capslock:
        alone: backspace
        held:  capslock
        one_timeout_millis: 10
      alt_l:
        alone: esc
        held: super_l # (more ergonomic super key)
        one_timeout_millis: 10

keymap:
  - name: browser
    application:
      only: firefox
    remap:
      M-t: c-t
      M-e: c-l
      M-o: c-o
      M-o: c-o
      M-q: c-w
      M-slash: c-f
      M-question: shift-f3
      M-n: c-g
      M-shift-n: c-shift-g

  - name: global
    remap:
      capslock-q: apostrophe
      capslock-w: shift-comma
      capslock-e: shift-dot
      capslock-r: shift-apostrophe
      capslock-t: grave
      capslock-s: minus
      capslock-d: shift-equal
      capslock-f: equal
      capslock-g: shift-key_3
      capslock-x: shift-key_5
      capslock-c: shift-key_8
      capslock-v: slash
      capslock-b: shift-grave
      capslock-y: shift-key_7
      capslock-h: shift-backslash
      capslock-u: shift-leftbrace
      capslock-i: shift-rightbrace
      capslock-j: shift-key_9
      capslock-k: shift-key_0
      capslock-m: leftbrace
      capslock-comma: rightbrace
      capslock-n: backslash
      capslock-l: shift-key_6
      capslock-o: shift-key_1
      capslock-p: shift-key_2
      capslock-semicolon: shift-key_4
# Src:1 ends here
