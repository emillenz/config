modmap:
  - name: global
    remap:
      capslock:
        alone: esc
        held: ctrl_l
        alone_timeout_millis: 200
      alt_r: super_l

keymap:
  - name: editing
    application:
      not: [Emacs, Alacritty]
    remap:
      # NAVIGATION
      M-q: c-w
      M-e: c-l
      M-t: c-t
      # editing
      c-h: backspace
      c-w: c-backspace
      C-u: [shift-home, delete]
      # COMPLETION && bash
      C-n: down
      C-p: up
