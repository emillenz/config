# [[file:config.org::*minimalist ergonomic symbol layer][minimalist ergonomic symbol layer:1]]
modmap:
  - name: global
    remap:
      capslock:
        alone: esc
        held: ctrl_l
        alone_timeout_millis: 200
      alt_l: super_l

keymap:
  - name: browser
    application:
      only: firefox
    remap:
      # NAVIGATION
      C-q: c-w
      C-s: c-l
      # EDITING
      C-h: backspace
      C-w: c-backspace
      C-u: [shift-home, delete]
      # COMPLETION
      C-j: down
      C-k: up

  - name: symlayer
    remap:
      C-7: shift-leftbrace
      C-8: shift-rightbrace
      C-9: leftbrace
      C-0: rightbrace
      C-comma: equal
      C-dot: shift-equal
      C-slash: backslash
      C-semicolon: shift-backslash
      C-space: space # NOTE :: don't interrupt fast typed command sequences by any binding
# minimalist ergonomic symbol layer:1 ends here
