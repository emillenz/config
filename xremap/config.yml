# -----
# title:  Xremap config
# author: Emil Lenz
# email:  emillenz@protonmail.com
# date:   2024-01-18
# info:   Implements global navigation scheme and enables vim layer systemwide.
# -----

# NOTE :: Vim layer (i know there is modal but this is meant for quick if you do more than that, you should use your editor (emacs) anyway.)
virtual_modifiers:
  - capslock

# NOTE::
# - Left thumb: escape; right thumb: space
# - Turn off key-repetition, this causes bad habits of you holding down a key instead of moving intelligently and fast using the appropriate motion (not holding down ~j~, istead using ~C-d~. Not spamming delete, instead using ~dw~).
modmap:
  - name: global
    remap:
      alt_l: # use as ergonomic super/alt key (if you don't have keyboard with thumbkeys).
        held: super_l
        alone: esc
        one_timeout_millis: 100
      backspace:
        alone: backspace
        held:  capslock
        one_timeout_millis: 100

keymap:
  # NOTE ::
  # - global navigation.
  # - use this in conjuction with firefox extension: vimium
  - name: browser
    application:
      only: firefox
    remap:
      M-t: c-t
      M-e: c-l
      M-o: c-o
      M-o: c-o
      M-q: c-w
      M-slash: c-f
      M-question: shift-f3
      M-n: c-g
      M-shift-n: c-shift-g

  - name: global
    remap:
      capslock-j: down
      capslock-k: up
      capslock-h: left
      capslock-l: right
      capslock-u: c-z
      capslock-shift-u: c-shift-z
      capslock-a: end
      capslock-i: home
      capslock-x: delete
      capslock-e: c-right
      capslock-b: c-left
      capslock-w: c-right
      capslock-g: c-home
      capslock-shift-g: c-end
      capslock-o: [end, enter]
      capslock-shift-o: [up, end, enter]
      capslock-p: [end, enter, c-v]
      capslock-slash: c-f
      capslock-question: shift-f3
      capslock-d: [c-delete] # NOTE :: delete word backward

      capslock-shift-c: [shift-end, C-x]
      capslock-c:
        remap:
          capslock-c: [home, shift-end, C-x]
          capslock-l: [shift-end, C-x]
          capslock-h: [shift-home, C-x]
          capslock-e: [c-shift-right, c-x]
          capslock-b: [c-shift-left, c-x]
          capslock-g: [c-shift-home, c-x]
          capslock-shift-g: [c-shift-end, c-x]
          capslock-i:
            remap:
              capslock-w: [c-left, c-shift-right, c-x]
          capslock-a:
            remap:
              capslock-w: [c-left, c-shift-right, c-x]

      capslock-shift-y: [shift-end, C-c]
      capslock-y:
        remap:
          capslock-y: [home, shift-end, C-c]
          capslock-l: [shift-end, C-c]
          capslock-h: [shift-home, C-c]
          capslock-e: [c-shift-right, c-c]
          capslock-b: [c-shift-left, c-c]
          capslock-g: [c-shift-home, c-c]
          shift-capslock-g: [c-shift-end, c-c]
          capslock-i:
            remap:
              capslock-w: [c-left, c-shift-right, c-c]
          capslock-a:
            remap:
              capslock-w: [c-left, c-shift-right, c-c]
