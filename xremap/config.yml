# [[file:config.org::*src][src:1]]
# note :: unused keys
virtual_modifiers:
  - capslock

modmap:
  - name: global
    remap:
      capslock:
        alone: esc
        held: capslock
        alone_timeout_millis: 200
      alt_l: super_l

keymap:
  - name: browser
    application:
      only: firefox
    remap:
      # NAVIGATION
      M-t: c-t
      M-q: c-w
      M-e: c-l
      # EDITING
      C-h: backspace
      C-w: c-backspace
      C-u: [shift-home, delete]
      # COMPLETION
      C-j: down
      C-k: up

  - name: symlayer
    remap:
      capslock-q: apostrophe
      capslock-w: shift-comma
      capslock-e: shift-dot
      capslock-r: shift-apostrophe
      capslock-t: grave

      capslock-a: shift-key_1
      capslock-s: shift-equal
      capslock-d: equal
      capslock-f: minus
      capslock-g: shift-key_3

      capslock-x: shift-key_6
      capslock-c: shift-key_8
      capslock-v: slash
      capslock-b: backslash

      capslock-y: shift-key_7
      capslock-h: shift-backslash
      capslock-n: shift-grave

      capslock-u: shift-semicolon
      capslock-j: shift-minus
      capslock-m: shift-key_4

      capslock-i: leftbrace
      capslock-o: rightbrace
      capslock-k: shift-key_9
      capslock-l: shift-key_0
      capslock-comma: shift-leftbrace
      capslock-dot: shift-rightbrace

      capslock-p: shift-key_2
      capslock-semicolon: shift-slash
      capslock-slash: shift-key_5
# src:1 ends here
