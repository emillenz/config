# HACK: this mapping scheme is using the dvorak layout and xremaps maps to the keycodes directly to the hardware layout: us-qwerty
# => thus the assigned keys but they just need to be translated
# be efficient in key usage, use kill line instead of holding-down the delete key.
#
# - Remap unergonomic keys to more ergo positions, allowing you to keep the hands on the homerow
# - Use adjacent-alts for the navigational keys: alt_l: os, alt_r: app
# - Left thumb: escape; right thumb: space
#
# Bindings with alt are to keep my global remapping scheme consistent.

virtual_modifiers:
  - capslock

modmap:
  - name: global
    remap:
      alt_l:
        alone: esc
        held:  super_l
        one_timeout_millis: 100
      capslock:
        alone: backspace
        held:  capslock
        one_timeout_millis: 100
      backspace:
        alone: backspace
        held:  capslock
        one_timeout_millis: 100

# NOTE :: these mappings do the same as vim motions, if not specified otherwise.
keymap:
  - name: global
    remap:
      capslock-j: down
      capslock-k: up
      capslock-h: left
      capslock-l: right
      capslock-u: c-z
      capslock-shift-u: c-shift-z
      capslock-a: end
      capslock-i: home
      capslock-x: delete
      capslock-e: c-right
      capslock-b: c-left
      capslock-g: c-home
      capslock-shift-g: c-end
      capslock-o: [end, enter]
      capslock-shift-o: [up, end, enter]
      capslock-w: [c-right, c-right]
      capslock-c:
        remap:
          capslock-c: [home, shift-end, C-x]
          capslock-4: [shift-end, C-x]
          capslock-w: [c-shift-left, c-shift-right, c-x]
          capslock-e: [c-shift-right, c-x]
          capslock-b: [c-shift-left, c-x]
          capslock-g: [c-shift-home, c-x]
          capslock-shift-g: [c-shift-end, c-x]
      capslock-y:
        remap:
          capslock-c: [home, shift-end, C-c, {set_mark: true}]
          capslock-4: [shift-end, c-c, {set_mark: true}]
          capslock-w: [c-shift-left, c-shift-right, c-c, {set_mark: true}]
          capslock-e: [c-shift-right, c-c, {set_mark: true}]
          capslock-b: [c-shift-left, c-c, {set_mark: true}]
          capslock-g: [c-shift-home, c-c]
          capslock-shift-g: [c-shift-end, c-c]
      capslock-p: [end, enter, c-v] # vim :: paste line below

  # use this in conjuction with firefox extension: vimium
  - name: browser
    application:
      only: firefox
    remap:
      alt-t: c-t
      alt-e: c-l
      alt-o: c-o
      alt-o: c-o
      alt-q: c-w
      alt-slash: c-f
      alt-question: shift-f3
      alt-n: c-g
      alt-shift-n: c-shift-g
