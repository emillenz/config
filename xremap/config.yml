# [[file:config.org::*Src][Src:1]]
virtual_modifiers:
  - menu

modmap:
  - name: global
    remap:
      backspace: capslock
      capslock:
        alone: backspace
        held:  menu
        one_timeout_millis: 10
      alt_l:
        alone: esc
        held: super_l # (more ergonomic super key)
        one_timeout_millis: 10

keymap:
  - name: browser
    application:
      only: firefox
    remap:
      M-t: [c-t, esc] # HACK :: esc to disble popup menu (caused by alt-release)
      M-e: c-l
      M-o: c-o
      M-o: c-o
      M-q: c-w
      M-slash: c-f
      M-question: shift-f3
      M-n: c-g
      M-shift-n: c-shift-g

  - name: global
    remap:
      menu-q: apostrophe
      menu-w: shift-comma
      menu-e: shift-dot
      menu-r: shift-apostrophe
      menu-t: grave

      menu-a: shift-key_1
      menu-s: shift-equal
      menu-d: minus
      menu-f: equal
      menu-g: shift-key_3

      menu-x: shift-key_6
      menu-c: shift-key_8
      menu-v: slash
      menu-b: shift-grave

      menu-y: shift-key_7
      menu-h: shift-backslash
      menu-n: backslash

      menu-u: shift-semicolon
      menu-j: shift-minus
      menu-m: shift-key_4

      menu-i: leftbrace
      menu-o: rightbrace
      menu-k: shift-key_9
      menu-l: shift-key_0
      menu-comma: shift-leftbrace
      menu-dot: shift-rightbrace

      menu-p: shift-key_2
      menu-semicolon: shift-key_5
# Src:1 ends here
