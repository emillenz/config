modmap:
  - name: global
    remap:
      capslock:
        alone: esc
        held: ctrl_l
        alone_timeout_millis: 200
      alt_l: super_l

keymap:
  - name: browser
    application:
      only: firefox
    remap:
      # NAVIGATION
      C-q: c-w
      C-b: c-tab

  - name: editing
    application:
      not: [emacs, alacritty]
    remap:
      # EDITING
      C-h: backspace
      C-w: c-backspace
      C-u: [shift-home, delete]
      # COMPLETION
      C-j: down
      C-k: up
