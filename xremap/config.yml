modmap:
  - name: global
    remap:
      capslock:
        held: ctrl_r
        alone: esc
        one_timeout_milis: 100

keymap:
  - name: browser
    application:
      only: firefox
    remap:
      # GLOBAL NAVIGATION SCHEME (note using plugin that enables tabswitching using CTRL)
      C-b: C-Tab
      C-e: C-l
      C-q: c-w
      C-r: [c-t, shift-key_6, space] # history search
      C-Enter: [c-t, shift-key_8, space] # goto bookmark
      # EDITING
      c-h: backspace
      c-w: c-backspace
      c-u: [shift-home, delete]
      # COMPLETION
      c-n: down
      c-p: up
